<!DOCTYPE html>
<html {{ HTML_ATTRS }}>
<head {{ HEAD_ATTRS }}>
  {{ HEAD }}
  <style>
    #thibella-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity 0.4s ease;
    }
    #thibella-splash.done {
      opacity: 0;
      pointer-events: none;
    }
    #thibella-splash svg text {
      fill: #059669;
    }
    #thibella-splash .dots {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    #thibella-splash .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10B981;
      animation: tb-bounce 0.6s infinite alternate;
    }
    #thibella-splash .dot:nth-child(2) { animation-delay: 0.15s; }
    #thibella-splash .dot:nth-child(3) { animation-delay: 0.30s; }
    @keyframes tb-bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }
  </style>
</head>
<body {{ BODY_ATTRS }}>
  <div id="thibella-splash">
    <svg viewBox="0 0 420 110" xmlns="http://www.w3.org/2000/svg" style="height:60px;width:auto">
      <text x="10" y="90" font-family="Georgia,serif" font-size="64" font-weight="700" letter-spacing="2" fill="#059669" font-style="italic">Thibella</text>
      <path d="M 10 100 Q 80 104, 160 100 T 330 100" stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  {{ APP }}
  <script>
    window.__removeSplash = function() {
      var el = document.getElementById('thibella-splash');
      if (el) {
        el.classList.add('done');
        setTimeout(function() { el.remove(); }, 400);
      }
    };
  </script>
</body>
</html>
